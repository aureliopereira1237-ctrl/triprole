<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Triprole</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<main class="app">

  <section id="inicio" class="page active">

    <header class="hero">
      <div class="badge">🌍 Triprole</div>
      <h1>Viva sua cidade.</h1>
      <p>Descubra lugares, eventos e pessoas perto de você.</p>
    </header>

    <button class="location-btn" onclick="ativarLocalizacao()">📍 Ativar localização</button>
    <p id="statusLocalizacao" class="status"></p>

    <input class="search" type="text" placeholder="Buscar festas, cafés, parques...">

    <h2>Locais perto de você</h2>

    <div class="grid">
      <button class="cat">🍔<span>Restaurantes</span></button>
      <button class="cat">🎵<span>Música</span></button>
      <button class="cat">☕<span>Cafés</span></button>
      <button class="cat">🌳<span>Parques</span></button>
      <button class="cat">🌃<span>Baladas</span></button>
      <button class="cat">🎭<span>Cultura</span></button>
    </div>

    <h2>Mood do dia</h2>

    <div class="moods">
      <button onclick="filtrarMood('pessoas')">🤝 Conhecer pessoas</button>
      <button onclick="filtrarMood('musica')">🎧 Boas músicas</button>
      <button onclick="filtrarMood('estudo')">📚 Estudar</button>
      <button onclick="filtrarMood('noite')">🌙 Sair à noite</button>
    </div>

    <h2 id="tituloLista">Sugestões para hoje</h2>
    <div id="listaLugares"></div>

  </section>

  <section id="comunidade" class="page">
    <h1>Comunidade</h1>
    <p class="sub">Compartilhe dicas, convide pessoas e descubra rolês.</p>

    <div class="composer">
      <textarea id="novoPost" placeholder="Conte uma dica ou chame alguém para um rolê..."></textarea>
      <button onclick="publicarPost()">Publicar</button>
    </div>

    <div id="feed"></div>
  </section>

  <section id="perfil" class="page">
    <h1>Perfil</h1>

    <div class="profile">
      <div class="avatar">👤</div>

      <input type="file" id="fotoInput" accept="image/*">
      <img id="fotoPerfil" src="" alt="">

      <input type="text" id="nomePerfil" placeholder="Seu nome">
      <input type="text" id="cidadePerfil" placeholder="Sua cidade">
      <textarea id="bioPerfil" placeholder="Sua bio"></textarea>

      <button onclick="salvarPerfil()">Salvar perfil</button>

      <div class="preview">
        <h2 id="previewNome">Seu nome</h2>
        <p id="previewCidade">Sua cidade</p>
        <p id="previewBio">Sua bio aparecerá aqui.</p>
      </div>
    </div>
  </section>

</main>

<nav class="menu">
  <button onclick="abrir('inicio')">🏠<span>Início</span></button>
  <button onclick="abrir('comunidade')">💬<span>Comunidade</span></button>
  <button onclick="abrir('perfil')">👤<span>Perfil</span></button>
</nav>

<script src="script.js"></script>
</body>
</html>
